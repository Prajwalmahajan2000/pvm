<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffdde1);
      background-size: 400% 400%;
      animation: gradientBG 8s ease infinite;
      overflow: hidden;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 📦 Responsive Box */
    .container {
      background: white;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 90%;
      max-width: 350px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    h2 {
      font-size: 20px;
      color: #333;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 18px;
      font-size: 16px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      margin: 10px;
    }

    #yesBtn {
      background-color: #4CAF50;
      color: white;
      animation: bounce 1.5s infinite;
    }

    #noBtn {
      background-color: #f44336;
      color: white;
      position: absolute;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    #message {
      margin-top: 20px;
      font-size: 20px;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .show {
      opacity: 1 !important;
    }

    /* ❤️ Hearts */
    .heart {
      position: absolute;
      color: red;
      font-size: 18px;
      animation: floatUp 4s linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-500px); opacity: 0; }
    }

    /* 🎉 Confetti */
    .confetti {
      position: absolute;
      width: 6px;
      height: 6px;
      animation: fall 3s linear infinite;
    }

    @keyframes fall {
      0% { transform: translateY(0); }
      100% { transform: translateY(500px); }
    }

  </style>
</head>
<body>

  <div class="container">
    <h2>Do you know....?👀</h2>

    <button id="yesBtn" onclick="celebrate()">What...?</button>


    <div id="message">Hey श्री-सखी🫶💕 <p> I Miss You...🫶💕 </div>
  </div>

  <script>
    function celebrate() {
      document.getElementById("message").classList.add("show");

      // 🎉 Confetti
      for (let i = 0; i < 40; i++) {
        let conf = document.createElement("div");
        conf.className = "confetti";
        conf.style.left = Math.random() * window.innerWidth + "px";
        conf.style.top = "0px";
        conf.style.backgroundColor = randomColor();
        conf.style.animationDuration = (Math.random() * 2 + 2) + "s";
        document.body.appendChild(conf);

        setTimeout(() => conf.remove(), 3000);
      }
    }

    function moveNo() {
      const btn = document.getElementById("noBtn");
      const container = document.querySelector(".container");

      const maxX = container.clientWidth - btn.offsetWidth;
      const maxY = container.clientHeight - btn.offsetHeight;

      const x = Math.random() * maxX;
      const y = Math.random() * maxY;

      btn.style.left = x + "px";
      btn.style.top = y + "px";
    }

    // ❤️ Floating hearts
    setInterval(() => {
      let heart = document.createElement("div");
      heart.className = "heart";
      heart.innerText = "❤️";
      heart.style.left = Math.random() * window.innerWidth + "px";
      heart.style.top = window.innerHeight + "px";
      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 4000);
    }, 400);

    function randomColor() {
      const colors = ["red", "blue", "yellow", "green", "pink", "orange"];
      return colors[Math.floor(Math.random() * colors.length)];
    }
  </script>

</body>
</html>
